# AI-generated: Nginx reverse proxy config for load balancing multiple backend instances.
# ip_hash ensures WebSocket connections (used by GraphQL subscriptions) are sticky —
# once a client establishes a WebSocket, subsequent requests go to the same upstream,
# preventing subscription disconnects.

upstream user_service {
    ip_hash;
    server user-service-1:3001;
    server user-service-2:3001;
}

upstream chat_service {
    ip_hash;
    server chat-service-1:3002;
    server chat-service-2:3002;
}

server {
    listen 80;

    location /user-service/ {
        proxy_pass http://user_service/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chat-service/ {
        proxy_pass http://chat_service/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
