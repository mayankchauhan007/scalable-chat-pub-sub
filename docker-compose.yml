version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: chat-postgres
    restart: always
    environment:
      POSTGRES_DB: chat
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: chat_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_user -d chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- User Service (2 instances) ---
  user-service-1:
    build: ./backend/user-service
    container_name: user-service-1
    restart: always
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chat_user
      DB_PASSWORD: chat_password
      DB_NAME: chat
    depends_on:
      postgres:
        condition: service_healthy

  user-service-2:
    build: ./backend/user-service
    container_name: user-service-2
    restart: always
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chat_user
      DB_PASSWORD: chat_password
      DB_NAME: chat
    depends_on:
      postgres:
        condition: service_healthy

  # --- Chat Service (2 instances) ---
  chat-service-1:
    build: ./backend/chat-service
    container_name: chat-service-1
    restart: always
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chat_user
      DB_PASSWORD: chat_password
      DB_NAME: chat
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat-service-2:
    build: ./backend/chat-service
    container_name: chat-service-2
    restart: always
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chat_user
      DB_PASSWORD: chat_password
      DB_NAME: chat
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Nginx Load Balancer ---
  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - user-service-1
      - user-service-2
      - chat-service-1
      - chat-service-2

  # --- React Frontend ---
  frontend:
    build: ./frontend
    container_name: chat-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      VITE_USER_SERVICE_URL: http://localhost:8080/user-service
      VITE_CHAT_SERVICE_URL: http://localhost:8080/chat-service
      VITE_CHAT_WS_URL: ws://localhost:8080/chat-service
    depends_on:
      - nginx

volumes:
  postgres_data: